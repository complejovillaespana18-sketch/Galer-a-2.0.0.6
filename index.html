<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>FOTON · Galería Privada</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', 'Poppins', sans-serif;
      background: linear-gradient(145deg, #c5e9f0 0%, #e0f4fa 100%);
      min-height: 100vh;
    }
    .login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #b8e6f0, #9fd3e0);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 50px;
      padding: 40px 30px;
      width: 90%;
      max-width: 350px;
      text-align: center;
    }
    .login-card h2 { color: #5faec2; margin-bottom: 20px; }
    .login-card input {
      width: 100%;
      padding: 15px;
      border: 2px solid #cae3ec;
      border-radius: 40px;
      font-size: 1rem;
      margin-bottom: 20px;
      text-align: center;
    }
    .login-card button {
      background: linear-gradient(135deg, #8fcbdc, #6eb6c9);
      border: none;
      padding: 12px 30px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      width: 100%;
      cursor: pointer;
    }
    .error-msg { color: #c97e7e; margin-top: 15px; font-size: 0.8rem; }
    .gallery-container { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
    .gallery-header { text-align: center; margin-bottom: 30px; }
    .gallery-header h1 { color: #4f8e9e; font-size: 1.8rem; }
    .gallery-header p { color: #7aafbe; }
    .stats-bar {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .stat-badge {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 8px 20px;
      color: #5faec2;
      font-weight: bold;
    }
    .download-all {
      background: linear-gradient(135deg, #7fc1d4, #5faec2);
      border: none;
      padding: 12px 25px;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin: 10px;
      transition: transform 0.1s;
    }
    .download-all:active { transform: scale(0.97); }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .gallery-item {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    .gallery-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #f0f0f0;
    }
    .item-info {
      padding: 8px;
      background: rgba(95, 174, 194, 0.1);
      font-size: 0.7rem;
      color: #5faec2;
      text-align: center;
    }
    .loading { text-align: center; padding: 50px; color: #5faec2; }
    .modal-viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .modal-viewer img { max-width: 90%; max-height: 80%; object-fit: contain; }
    .modal-download {
      position: absolute;
      bottom: 30px;
      right: 30px;
      background: #5faec2;
      border: none;
      padding: 12px 20px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(95, 174, 194, 0.95);
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      z-index: 4000;
      animation: fadeOut 2s forwards;
    }
    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h2>🔐 Galería Privada</h2>
    <input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="off">
    <button id="loginBtn">Entrar</button>
    <div id="loginError" class="error-msg"></div>
  </div>
</div>

<div id="galleryContainer" class="gallery-container">
  <div class="gallery-header">
    <h1>🦋 Galería Mágica 🦋</h1>
    <p>Todas las fotos y notas enviadas desde FOTON 2.0</p>
    <div class="stats-bar">
      <div class="stat-badge" id="fotosCount">📸 0 fotos</div>
      <div class="stat-badge" id="notasCount">💌 0 notas</div>
      <div class="stat-badge" id="totalCount">✨ 0 total</div>
    </div>
    <button id="downloadAllBtn" class="download-all"><i class="fas fa-download"></i> Descargar todas (ZIP)</button>
    <button id="refreshBtn" class="download-all" style="background: #cae3ec; color: #5faec2;"><i class="fas fa-sync-alt"></i> Actualizar</button>
  </div>
  <div id="galleryGrid" class="gallery-grid">
    <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Cargando recuerdos...</div>
  </div>
</div>

<script>
  const JSONBIN_BIN_ID = "69c32fd6aa77b81da917906c";
  const CONTRASENA_CORRECTA = "foton2026";
  let todosRecuerdos = [];

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  async function cargarGaleria() {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Cargando...</div>';
    
    try {
      const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const data = await response.json();
      todosRecuerdos = data.record.recuerdos || [];
      
      // Filtrar solo los que tienen URL válida
      todosRecuerdos = todosRecuerdos.filter(r => r.imagenUrl && r.imagenUrl !== 'undefined');
      todosRecuerdos.sort((a, b) => b.timestamp - a.timestamp);
      
      const fotos = todosRecuerdos.filter(r => r.tipo === 'photo').length;
      const notas = todosRecuerdos.filter(r => r.tipo === 'note').length;
      
      document.getElementById('fotosCount').innerHTML = `📸 ${fotos} fotos`;
      document.getElementById('notasCount').innerHTML = `💌 ${notas} notas`;
      document.getElementById('totalCount').innerHTML = `✨ ${todosRecuerdos.length} total`;
      
      renderGaleria();
    } catch (error) {
      console.error('Error:', error);
      grid.innerHTML = `<div class="loading">❌ Error al cargar.<br><br><button onclick="cargarGaleria()" style="padding:10px 20px; border-radius:30px; border:none; background:#5faec2; color:white;">Reintentar</button></div>`;
    }
  }
  
  function renderGaleria() {
    const grid = document.getElementById('galleryGrid');
    
    if (todosRecuerdos.length === 0) {
      grid.innerHTML = '<div class="loading">✨ Aún no hay fotos. ✨</div>';
      return;
    }
    
    let html = '';
    for (const item of todosRecuerdos) {
      const badge = item.tipo === 'photo' ? '📷 Foto' : '💌 Nota';
      const nombre = item.nombre ? `✨ ${escapeHtml(item.nombre)}` : '';
      
      html += `
        <div class="gallery-item" data-url="${escapeHtml(item.imagenUrl)}" data-nombre="${escapeHtml(item.nombre || '')}" data-mensaje="${escapeHtml(item.mensaje || '')}" data-tipo="${item.tipo}">
          <img src="${escapeHtml(item.imagenUrl)}" loading="lazy" alt="recuerdo" 
               onerror="this.onerror=null; this.src='https://placehold.co/400x400/ffcccc/cc6666?text=Error';">
          <div class="item-info">
            ${badge} ${nombre}<br>
            <small>${item.fechaLegible || ''}</small>
          </div>
        </div>
      `;
    }
    grid.innerHTML = html;
    
    document.querySelectorAll('.gallery-item').forEach(el => {
      el.addEventListener('click', () => {
        const url = el.dataset.url;
        if (url && url.startsWith('http')) {
          abrirModal(url);
        }
      });
    });
  }
  
  function abrirModal(url) {
    const modal = document.createElement('div');
    modal.className = 'modal-viewer';
    const img = document.createElement('img');
    img.src = url;
    modal.appendChild(img);
    const btn = document.createElement('button');
    btn.innerHTML = '<i class="fas fa-download"></i> Descargar';
    btn.className = 'modal-download';
    btn.onclick = (e) => {
      e.stopPropagation();
      window.open(url, '_blank');
    };
    modal.appendChild(btn);
    modal.addEventListener('click', () => modal.remove());
    document.body.appendChild(modal);
  }
  
  // Descargar todas en ZIP automáticamente
  async function descargarTodoZip() {
    const validos = todosRecuerdos.filter(r => r.imagenUrl && r.imagenUrl.startsWith('http'));
    
    if (validos.length === 0) {
      showToast('No hay fotos para descargar');
      return;
    }
    
    showToast(`🦋 Preparando ${validos.length} archivos...`);
    const zip = new JSZip();
    let count = 0;
    
    for (const item of validos) {
      try {
        const response = await fetch(item.imagenUrl);
        if (!response.ok) throw new Error();
        const blob = await response.blob();
        const extension = blob.type.split('/')[1] || 'jpg';
        const fileName = `${item.tipo}_${item.timestamp}.${extension}`;
        zip.file(fileName, blob);
        count++;
      } catch(e) {
        console.warn('Error con:', item.imagenUrl);
      }
    }
    
    if (count > 0) {
      const content = await zip.generateAsync({ type: "blob" });
      saveAs(content, `foton_galeria_${Date.now()}.zip`);
      showToast(`✨ Descargadas ${count} imágenes ✨`);
    } else {
      showToast('❌ No se pudo descargar ninguna imagen', true);
    }
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  document.getElementById('loginBtn').addEventListener('click', () => {
    const pwd = document.getElementById('passwordInput').value;
    if (pwd === CONTRASENA_CORRECTA) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('galleryContainer').style.display = 'block';
      cargarGaleria();
    } else {
      document.getElementById('loginError').textContent = '🔒 Contraseña incorrecta';
    }
  });
  
  document.getElementById('refreshBtn').addEventListener('click', cargarGaleria);
  document.getElementById('downloadAllBtn').addEventListener('click', descargarTodoZip);
</script>
</body>
</html>
